# Agent Context PR Gate
# =====================
# Reusable GitHub Actions workflow that verifies .agent-context/ is updated
# whenever context-relevant files change in a pull request.
#
# Usage:
#   Copy this file into your repo at .github/workflows/agent-context.yml
#   No configuration needed — it works out of the box with default settings.
#
# How it works:
#   1. Runs `npx agent-chorus agent-context verify --ci` against the PR diff
#   2. If code changed but .agent-context/ was not updated, the check fails
#   3. A comment is posted on the PR explaining what to do
#
# Emergency bypass:
#   Add the label "skip-agent-context-check" to the PR to skip this gate.

name: Agent Context Freshness

on:
  pull_request:
    branches: [main]
  # P12 / F43 — post-merge verify catches drift even when a PR was merged
  # with `[skip ci]` or the PR gate was bypassed. Branch-protection rules
  # should also disallow `[skip ci]` on protected branches; this job is the
  # belt-and-braces safety net.
  push:
    branches: [main]

# Cancel redundant runs when the PR is updated.
concurrency:
  group: agent-context-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write  # needed to post the status comment
  issues: write  # needed to label HIGH_TRUST_DIFF

jobs:
  verify-agent-context:
    name: Verify agent-context pack
    runs-on: ubuntu-latest

    # PR-only job. Skip the entire job when the bypass label is present.
    if: "github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'skip-agent-context-check')"

    steps:
      # -----------------------------------------------------------
      # 1. Check out the full branch so we can diff against origin/main.
      # -----------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch full history so origin/main is available for the diff.
          fetch-depth: 0

      # -----------------------------------------------------------
      # 2. Pin a stable Node.js version.
      # -----------------------------------------------------------
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # -----------------------------------------------------------
      # 3. Run the freshness check.
      #    Exit codes:
      #      0 — pack is up to date (or no relevant files changed)
      #      1 — relevant code changed but pack was NOT updated
      # -----------------------------------------------------------
      - name: Check agent-context freshness
        id: freshness
        run: |
          set +e
          OUTPUT=$(npx agent-chorus@latest agent-context check-freshness --base origin/main 2>&1)
          EXIT_CODE=$?
          echo "$OUTPUT"

          # Make the output available to later steps.
          {
            echo "result<<EOF"
            echo "$OUTPUT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          if [ $EXIT_CODE -ne 0 ]; then
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          # Even with exit 0, check for the WARNING prefix that
          # check-freshness emits when the pack is stale.
          if echo "$OUTPUT" | grep -q "^WARNING"; then
            echo "status=stale" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "status=pass" >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------------
      # 4. On failure, post a helpful comment on the PR.
      # -----------------------------------------------------------
      - name: Post PR comment on failure
        if: failure() && steps.freshness.outputs.status != 'pass'
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              '### Agent Context check failed',
              '',
              'This PR changes context-relevant files but `.agent-context/` was not updated.',
              '',
              '**How to fix:**',
              '1. Run your agent to update the context pack contents',
              '2. Run `npx agent-chorus agent-context seal`',
              '3. Commit the updated `.agent-context/` directory',
              '',
              '**Emergency bypass:**',
              'Add the label `skip-agent-context-check` to this PR.',
              '',
              '<details><summary>Check output</summary>',
              '',
              '```',
              `${{ steps.freshness.outputs.result }}`,
              '```',
              '',
              '</details>',
            ].join('\n');

            // Avoid duplicate comments on re-runs — update if one exists.
            const marker = '### Agent Context check failed';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body?.startsWith(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  # =================================================================
  # P12 / F39 — HIGH_TRUST_DIFF labeling
  # =================================================================
  # Flag PRs that modify trust-boundary prose so CODEOWNERS approval is
  # required before merge. The check inspects the PR diff for changes to:
  #
  #   - `.agent-context/current/30_BEHAVIORAL_INVARIANTS.md` (any prose line)
  #   - routing blocks in `CLAUDE.md`, `AGENTS.md`, `GEMINI.md`
  #     (content between `<!-- agent-chorus:context-pack:*:start -->` and
  #     `:end -->` markers, or any change if no markers are present)
  #   - instruction sections of `.agent-context/current/00_START_HERE.md`
  #     (H2 headings whose body changed)
  #
  # When any of these show prose diffs, the job applies the label
  # `HIGH_TRUST_DIFF` and exits non-zero so branch-protection can require a
  # CODEOWNERS review before merge.
  label-high-trust-diff:
    name: Label HIGH_TRUST_DIFF when trust-boundary prose changes
    runs-on: ubuntu-latest
    if: "github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'skip-agent-context-check')"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect trust-boundary prose changes
        id: detect
        run: |
          set -euo pipefail
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          # Paths whose prose lives on the pack trust boundary. Any additions
          # or modifications here flag HIGH_TRUST_DIFF.
          TRUST_PATHS=(
            ".agent-context/current/30_BEHAVIORAL_INVARIANTS.md"
            ".agent-context/current/00_START_HERE.md"
            "CLAUDE.md"
            "AGENTS.md"
            "GEMINI.md"
          )

          TRIGGERED=0
          REASONS=""
          for path in "${TRUST_PATHS[@]}"; do
            if [ ! -f "$path" ]; then
              continue
            fi
            # `git diff --quiet` exits 1 when there ARE differences.
            if ! git diff --quiet "$BASE_SHA" "$HEAD_SHA" -- "$path"; then
              TRIGGERED=1
              REASONS="${REASONS}- ${path}\n"
            fi
          done

          if [ "$TRIGGERED" -eq 1 ]; then
            echo "triggered=true" >> "$GITHUB_OUTPUT"
            {
              echo "reasons<<EOF"
              printf '%b' "$REASONS"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "triggered=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply HIGH_TRUST_DIFF label and require CODEOWNERS
        if: steps.detect.outputs.triggered == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const reasons = `${{ steps.detect.outputs.reasons }}`;
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['HIGH_TRUST_DIFF'],
            });
            const body = [
              '### HIGH_TRUST_DIFF applied',
              '',
              'This PR modifies trust-boundary prose. CODEOWNERS approval is',
              'required before merge. Files touched:',
              '',
              reasons || '(no reason captured)',
              '',
              'Configure branch-protection to require CODEOWNERS review on the',
              '`HIGH_TRUST_DIFF` label.',
            ].join('\n');
            const marker = '### HIGH_TRUST_DIFF applied';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body?.startsWith(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
            core.setFailed('HIGH_TRUST_DIFF label applied — CODEOWNERS approval required.');

  # =================================================================
  # P12 / F43 — post-merge verify (skip-CI safety net)
  # =================================================================
  # Runs on every push to `main`, including merges that used `[skip ci]`
  # or bypassed the PR gate another way. Branch-protection rules should
  # disallow `[skip ci]` on protected branches as the primary defense;
  # this job is the belt-and-braces check so drift is caught even when
  # that is forgotten.
  post-merge-verify:
    name: Post-merge agent-context verify
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify pack integrity + structural checks
        run: |
          set -e
          npx agent-chorus@latest agent-context verify --ci

  # =================================================================
  # OPTIONAL: Separate-commit enforcement
  # =================================================================
  # Uncomment the job below if your team wants to enforce that
  # .agent-context/ changes live in their own commit, separate from
  # code changes. This keeps the git history clean and makes reverts
  # easier. This is advisory — many teams prefer to skip this.
